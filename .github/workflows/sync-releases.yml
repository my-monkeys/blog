name: sync-releases
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with bot token so push triggers build)
        uses: actions/checkout@v4
        with:
          # PAT or GitHub App token required for the push to trigger
          # build-and-release.yml. Default GITHUB_TOKEN won't propagate.
          token: ${{ secrets.BOT_PAT }}
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Sync releases
        run: node scripts/sync-releases.mjs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Commit & push if changed
        run: |
          if [[ -n "$(git status --porcelain src/content/posts/)" ]]; then
            git config user.name "monkey-bot"
            git config user.email "bot@my-monkey.fr"
            git add src/content/posts/
            git commit -m "chore: sync release posts ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push
          else
            echo "No new releases to sync."
          fi
